<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criety Group</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 画面上部のロゴエリア -->
    <nav class="top-nav">
        <div class="logo">Criety Group</div>
    </nav>

    <!-- トップのキャッチコピー部分 -->
    <header class="hero-section">
        <h1 class="catchphrase">ミライを人で。</h1>
    </header>

    <!-- 事業内容セクション（ここから追加！） -->
    <section class="services-section">
        <h2 class="section-title">SERVICES</h2>
        
        <!-- 4つの事業を並べる箱 -->
        <div class="services-grid">
            
            <!-- 事業1：Web制作 -->
            <div class="service-card">
                <h3>Web制作</h3>
                <p>モダンなデザインとロジカルな設計で、価値を正確に届けるWebサイトを構築します。</p>
            </div>
            
            <!-- 事業2：動画編集 -->
            <div class="service-card">
                <h3>動画編集</h3>
                <p>意図が伝わる構成と編集で、魅力的な映像コンテンツを制作します。</p>
            </div>
            
            <!-- 事業3：Discord管理 -->
            <div class="service-card">
                <h3>Discord管理</h3>
                <p>コミュニティの設計から運用まで、円滑なコミュニケーション環境を構築します。</p>
            </div>
            
            <!-- 事業4：家庭教師 -->
            <div class="service-card">
                <h3>家庭教師</h3>
                <p>一人ひとりに寄り添い、目標達成に向けた伴走型の学習サポートを提供します。</p>
            </div>

        </div>
    </section>
</body>
</html>
